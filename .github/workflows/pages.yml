name: Build and Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Patch
        env:
          A2392D: ${{ secrets.A2392D }}
          B57851: ${{ secrets.B57851 }}
        run: |
          python3 -c "
          import os, sys, pathlib
          a, b = os.environ.get('A2392D', ''), os.environ.get('B57851', '')
          html = pathlib.Path('index.html')
          text = html.read_text(encoding='utf-8')
          patched = text
          if a:
              patched = patched.replace('<!-- 18611feea080a845f7c76c2b3572 -->', a)
          if b:
              patched = patched.replace('<!-- 2d8955cd3f238d43510a4a357523b2767951f21a -->', b)
          if patched == text and (a or b):
              sys.exit(1)
          if patched != text:
              html.write_text(patched, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: publish
        uses: actions/deploy-pages@v4
